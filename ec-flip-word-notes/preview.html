<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EC LAB - Visual Notes</title>
    <style>
        /* EC Core Variables */
        :root {
            --radius-none: 0px;
            --radius-sm: 6px;
            --radius-md: 16px;
            --radius-lg: 28px;

            --font-sans: 'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            --font-serif: Georgia, "Times New Roman", Times, serif;
            --font-chinese: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif;

            --bg-base: #f5f5f7;
            --card-bg: #ffffff;
            --text-main: #161616;
            --text-muted: #8c8c8c;
            --accent-color: #3b7ab5; /* Changed from red to a stylish blue */
            --border-light: #e6e6e6;
        }

        /* Reset & Base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
        }

        /* Layout */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 40px;
            font-size: 13px;
            letter-spacing: 0.5px;
            z-index: 10;
        }

        .header-left {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .header-left strong {
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0px;
        }

        .header-left span {
            font-family: var(--font-chinese);
            color: var(--text-main);
        }

        .header-right {
            color: var(--text-main);
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 40px;
            font-size: 12px;
            color: var(--text-main);
            margin-top: auto;
            z-index: 10;
        }

        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 40px 20px;
        }

        /* 3D Book Page Mechanics */
        .scene {
            width: 340px;
            height: 480px;
            perspective: 2000px; /* Enhanced depth for page turn */
            position: relative;
            /* Base shadow for the entire book block */
            border-radius: var(--radius-sm);
        }

        .scene::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: var(--radius-sm);
            box-shadow: 
                0 25px 50px -12px rgba(0,0,0,0.2), /* Enhanced base shadow */
                0 10px 15px -3px rgba(0,0,0,0.1);
            pointer-events: none;
            z-index: -1;
        }

        .page {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            border-radius: var(--radius-sm);
            /* Transform origin on the top simulates a top-bound calendar (台历效果) */
            transform-origin: top center;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            /* Crucial: hides the page when it flips past 90 degrees */
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            overflow: hidden;
            /* 加深顶部的内阴影，模拟装订处的厚度和纵深，增加轻微的纸面阴影 */
            box-shadow: inset 0 6px 12px rgba(0,0,0,0.03), inset 0 0 0 1px rgba(0,0,0,0.02), 0 2px 8px rgba(0,0,0,0.02);
        }

        /* Flipped state sends the page swinging UP around the top hinge */
        .page.flipped {
            transform: rotateX(180deg);
            /* 翻开时增加背面的浮空投影 */
            box-shadow: 0 -15px 25px rgba(0,0,0,0.1), inset 0 6px 12px rgba(0,0,0,0.03);
        }

        /* Card Content Styles */
        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 32px;
        }

        /* Cover & Back Cover State */
        .is-cover .card-inner {
            justify-content: center;
            align-items: center;
        }

        .cover-content {
            text-align: center;
            transform: translateY(-20px);
        }

        .cover-content h2 {
            font-size: 24px;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .cover-content p {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 3px;
            color: var(--text-main);
            margin-bottom: 24px;
        }

        .cover-line {
            width: 24px;
            height: 1px;
            background-color: var(--text-muted);
            margin: 0 auto;
        }

        .page-num {
            position: absolute;
            bottom: 32px;
            left: 32px;
            font-size: 12px;
            color: var(--text-muted);
            font-family: var(--font-mono);
            letter-spacing: 2px;
        }

        .tap-hint {
            position: absolute;
            bottom: 32px;
            right: 32px;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        /* Content State (Illustration & Vocab) */
        .is-content .card-inner {
            justify-content: flex-start;
        }

        .tag-vertical {
            position: absolute;
            top: 32px;
            right: 32px;
            border: 1px solid var(--text-main);
            padding: 8px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            border-radius: var(--radius-none);
        }

        .tag-vertical span:first-child {
            font-size: 9px;
            font-weight: 600;
            writing-mode: horizontal-tb;
            letter-spacing: 0.5px;
        }

        .tag-line {
            width: 10px;
            height: 1px;
            background-color: var(--text-main);
        }

        .tag-vertical span:last-child {
            font-family: var(--font-chinese);
            font-size: 12px;
            writing-mode: vertical-rl;
            letter-spacing: 2px;
        }

        /* Illustration Region */
        .illus-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: top center;
            margin-top: 20px;
        }

        .illus-svg {
            width: 100%;
            max-width: 260px;
            height: auto;
            overflow: visible;
            /* 赋予插画立体贴纸感 */
            filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.08)); 
        }

        /* Vocab Region */
        .vocab-wrapper {
            height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(20px);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-bottom: 20px;
        }

        /* 2D Layout Shift: Reveal Vocab */
        .page.show-vocab .illus-wrapper {
            flex: 0 0 auto;
            transform: scale(0.65) translateY(0px);
            margin-top: 0;
            margin-bottom: 20px;
        }

        .page.show-vocab .vocab-wrapper {
            height: 140px;
            opacity: 1;
            transform: translateY(0);
        }

        .vocab-col {
            display: flex;
            flex-direction: column;
            width: 45%;
        }

        .vocab-col.right {
            align-items: flex-start;
            padding-left: 10px;
        }

        .v-furigana { font-size: 10px; font-weight: 600; font-family: var(--font-chinese); }
        .v-kanji { font-size: 26px; font-weight: 600; font-family: var(--font-chinese); margin: 6px 0; }
        .v-romaji { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }

        .v-en { font-size: 13px; font-weight: 600; margin-top: 16px; margin-bottom: 4px; }
        .v-id { font-size: 11px; color: var(--text-muted); }

        .vocab-divider {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 10%;
            position: relative;
            height: 100%;
        }

        .vocab-divider::before {
            content: '';
            position: absolute;
            top: 10px;
            bottom: 10px;
            width: 1px;
            background-color: var(--border-light);
            z-index: 1;
        }

        .sync-icon {
            width: 16px;
            height: 16px;
            background: var(--card-bg);
            z-index: 2;
            padding: 2px;
            color: var(--text-muted);
        }

        /* Floating Animation Arrows */
        .turn-arrow {
            position: absolute;
            left: 50%;
            width: 40px;
            height: 40px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 0;
        }

        .turn-arrow.active {
            opacity: 0.6;
        }

        .arrow-up { 
            top: -50px; 
            transform: translateX(-50%) rotate(90deg); 
        }
        .arrow-up.active {
            animation: float-arrow-up 1.2s infinite ease-in-out;
        }

        .arrow-down { 
            bottom: -50px; 
            transform: translateX(-50%) rotate(-90deg); 
        }
        .arrow-down.active {
            animation: float-arrow-down 1.2s infinite ease-in-out;
        }

        @keyframes float-arrow-up {
            0%, 100% { transform: translateX(-50%) translateY(0) rotate(90deg); }
            50% { transform: translateX(-50%) translateY(-10px) rotate(90deg); }
        }

        @keyframes float-arrow-down {
            0%, 100% { transform: translateX(-50%) translateY(0) rotate(-90deg); }
            50% { transform: translateX(-50%) translateY(10px) rotate(-90deg); }
        }

        /* Global Interaction Zones Overlay */
        .hit-zones {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 99; /* Always on top of all pages */
            display: flex;
            flex-direction: column;
        }
        .hit-top { width: 100%; height: 40%; cursor: pointer; }
        .hit-bottom { width: 100%; height: 60%; cursor: pointer; }

        @media (max-width: 600px) {
            .header, .footer { padding: 20px; flex-direction: column; gap: 10px; align-items: flex-start;}
            .header-right, .footer-right { align-self: flex-start; }
            .scene { width: 300px; height: 420px; }
            .turn-arrow { display: none; }
        }

    </style>
</head>
<body>

    <header class="header">
        <div class="header-left">
            <strong>EC LAB</strong>
            <span>ec 的实验室</span>
        </div>
        <div class="header-right">
            Visual Notes / AI Workflow
        </div>
    </header>

    <main class="main-container">

        <!-- SVG Template Engine for Reusability (大幅降低批量生成的Token消耗) -->
        <!-- 
            【SVG 纯代码手绘原理解析】
            这里的图形完全由数学路径（Path）和基础形状绘制，不依赖任何外部图片：
            1. <path d="..."> : 核心路径指令。
               - M (MoveTo): 抬起画笔，将起点移动到指定坐标 (x,y)，例如 M50,45。
               - C (Cubic Bezier): 三次贝塞尔曲线。需要2个控制点和1个终点，用来画出非常圆润的曲线（如史莱姆软乎乎的身体）。
               - Q (Quadratic Bezier): 二次贝塞尔曲线。需要1个控制点和1个终点，用来画简单的弧度（如人物生气的嘴巴）。
               - L (LineTo): 从当前点画一条直线到目标坐标。小写字母 (如 l, m) 代表相对坐标。
               - Z (ClosePath): 闭合路径，把当前点和起点连起来。
            2. <circle> / <ellipse> : 圆和椭圆。
               - cx, cy 是圆心坐标，r 是半径，rx/ry 控制椭圆的横竖半轴（常用来画盾牌、特效光点）。
            3. fill="none" stroke="..." : 这种组合表示“只描边、不填充”，从而实现极简的线框手绘风格。
        -->
        <svg style="display: none;">
            <defs>
                <!-- 注册组件：史莱姆的基础身体 (使用 C 曲线画出软乎乎的质感) -->
                <g id="slime-base">
                    <path d="M140,95 C145,80 165,75 175,85 C185,95 185,110 170,115 C150,120 135,110 140,95 Z" fill="none" stroke="var(--accent-color)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                </g>
                <!-- 注册组件：骑士的基础身体模型 -->
                <g id="knight-base">
                    <!-- 头盔后脑勺 (连续使用 C 曲线) -->
                    <path d="M50,45 C35,45 25,60 25,80 C25,95 30,105 45,105 C55,105 60,95 65,80 C65,65 60,45 50,45 Z" fill="none" stroke="var(--text-main)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    <!-- 盔甲后颈部的线条 (Q 曲线) -->
                    <path d="M25,80 Q20,85 28,95" fill="none" stroke="var(--text-main)" stroke-width="3" stroke-linecap="round"/>
                    <!-- 脸部留白区 (使用白色填充 #fff 遮盖底层线条) -->
                    <path d="M40,65 C35,80 40,95 55,95 C65,95 70,80 65,65 Z" fill="#fff" stroke="var(--text-main)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <!-- 护目处基础线条 -->
                    <path d="M35,65 C45,55 60,55 70,65" fill="none" stroke="var(--text-main)" stroke-width="3.5" stroke-linecap="round"/>
                    <!-- 头顶的主题色装饰羽翎 (M 移动后 L 直线组合) -->
                    <path d="M50,45 L52,60 M40,50 L45,62 M60,50 L55,62" fill="none" stroke="var(--accent-color)" stroke-width="2" stroke-linecap="round"/>
                    <!-- 脸颊两侧的头盔细节 -->
                    <path d="M30,70 L35,65 M75,70 L70,65" fill="none" stroke="var(--text-main)" stroke-width="3" stroke-linecap="round"/>
                    <!-- 生气的表情：皱眉 (使用相对坐标 l) 和 嘴巴 (使用相对坐标曲线 q) -->
                    <path d="M45,75 l5,2 M60,75 l-5,2 M50,85 q3,-2 6,0" fill="none" stroke="var(--text-main)" stroke-width="2" stroke-linecap="round"/>
                    <!-- 身体和肩膀的护甲轮廓 -->
                    <path d="M45,105 L40,115 L65,115 L60,105" fill="none" stroke="var(--text-main)" stroke-width="2.5" stroke-linejoin="round"/>
                </g>
            </defs>
        </svg>

        <svg class="turn-arrow arrow-up" id="arrow-prev" viewBox="0 0 40 40">
            <path d="M28,10 Q15,10 10,20 Q15,30 28,30 M10,20 L18,14 M10,20 L18,26" fill="none" stroke="var(--text-main)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>

        <div class="scene" id="scene">
            <!-- Global click interceptors -->
            <div class="hit-zones">
                <div class="hit-top" onclick="handleAction('prev', event)"></div>
                <div class="hit-bottom" onclick="handleAction('next', event)"></div>
            </div>
            <!-- Pages will be injected here by JS -->
        </div>

        <svg class="turn-arrow arrow-down" id="arrow-next" viewBox="0 0 40 40">
            <path d="M28,10 Q15,10 10,20 Q15,30 28,30 M10,20 L18,14 M10,20 L18,26" fill="none" stroke="var(--text-main)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>

    </main>

    <footer class="footer">
        <div class="footer-left">Build with AI</div>
        <div class="footer-right">Record. Explore. Share.</div>
    </footer>

    <script>
        // Data Structure for the Book Pages
        // Total 5 Physical Pages

        const svgAttack = `
            <svg class="illus-svg" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
                <!-- Slime (Reused via Template) -->
                <use href="#slime-base" />
                <path d="M150,92 l4,4 m0,-4 l-4,4 m15,0 l4,4 m0,-4 l-4,4 M158,102 q4,3 8,0" fill="none" stroke="var(--text-main)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="145" cy="75" r="2" fill="var(--accent-color)"/><circle cx="185" cy="80" r="1.5" fill="var(--accent-color)"/>
                <path d="M178,70 l2,-3 m0,3 l2,2" fill="none" stroke="var(--accent-color)" stroke-width="1.5" stroke-linecap="round"/>
                <!-- Knight (Reused via Template) -->
                <use href="#knight-base" />
                <path d="M40,108 L45,115 M65,108 L60,115" fill="none" stroke="var(--accent-color)" stroke-width="1.5"/>
                <ellipse cx="40" cy="100" rx="12" ry="22" transform="rotate(-15 40 100)" fill="#fff" stroke="var(--text-main)" stroke-width="2.5"/>
                <ellipse cx="40" cy="100" rx="6" ry="16" transform="rotate(-15 40 100)" fill="none" stroke="var(--accent-color)" stroke-width="1.5"/>
                <!-- Sword -->
                <path d="M60,95 Q75,100 85,95" fill="none" stroke="var(--text-main)" stroke-width="2.5" stroke-linecap="round"/>
                <circle cx="85" cy="95" r="3" fill="var(--text-main)"/>
                <path d="M85,95 L145,100 L140,90 Z" fill="none" stroke="var(--text-main)" stroke-width="2.5" stroke-linejoin="round"/>
                <path d="M85,90 L90,105" fill="none" stroke="var(--text-main)" stroke-width="2.5" stroke-linecap="round"/>
                <path d="M100,70 Q115,80 120,95 M110,65 Q125,75 130,90" fill="none" stroke="var(--text-main)" stroke-width="2" stroke-linecap="round"/>
                <path d="M125,65 Q135,75 140,85" fill="none" stroke="var(--accent-color)" stroke-width="1.5" stroke-linecap="round"/>
            </svg>`;

        const svgMagic = `
            <svg class="illus-svg" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
                <!-- Slime (Shocked, Reused via Template) -->
                <use href="#slime-base" />
                <circle cx="152" cy="92" r="2" fill="var(--text-main)"/> <circle cx="168" cy="95" r="2" fill="var(--text-main)"/>
                <ellipse cx="160" cy="102" rx="3" ry="5" fill="none" stroke="var(--text-main)" stroke-width="2.5"/>
                <!-- Knight Base (Reused via Template) -->
                <use href="#knight-base" />
                <!-- Staff and Arm -->
                <path d="M60,95 Q80,85 85,60" fill="none" stroke="var(--text-main)" stroke-width="2.5" stroke-linecap="round"/>
                <path d="M75,95 L95,35" fill="none" stroke="var(--text-main)" stroke-width="3" stroke-linecap="round"/>
                <circle cx="95" cy="35" r="7" fill="#fff" stroke="var(--accent-color)" stroke-width="2.5"/>
                <!-- Magic Particles -->
                <path d="M102,40 C115,45 125,60 140,75" fill="none" stroke="var(--accent-color)" stroke-width="2" stroke-dasharray="4 6" stroke-linecap="round"/>
                <path d="M135,70 L142,75 L135,82 Z" fill="var(--accent-color)"/>
            </svg>`;

        const svgDefense = `
            <svg class="illus-svg" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
                <!-- Slime Splattered (Custom shape, no template) -->
                <path d="M100,80 C105,70 125,75 125,90 C125,105 105,110 100,100 C95,95 95,85 100,80 Z" fill="none" stroke="var(--accent-color)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M105,85 L115,85 M105,95 L115,95 M110,88 V92" fill="none" stroke="var(--text-main)" stroke-width="2.5" stroke-linecap="round"/>
                <path d="M100,70 L90,60 M100,110 L90,120 M110,65 L115,55" fill="none" stroke="var(--text-main)" stroke-width="2" stroke-linecap="round"/>
                <!-- Knight Base (Reused via Template, shifted slightly left for giant shield) -->
                <use href="#knight-base" transform="translate(-5, 0)" />
                <!-- Giant Shield -->
                <path d="M70,55 C85,55 95,65 95,85 C95,105 85,115 70,115 C65,115 60,110 60,105 L60,65 C60,60 65,55 70,55 Z" fill="#fff" stroke="var(--text-main)" stroke-width="3.5" stroke-linejoin="round"/>
                <path d="M75,65 V105 M65,85 H85" fill="none" stroke="var(--accent-color)" stroke-width="2" stroke-linecap="round"/>
            </svg>`;

        const bookData = [
            { id: 0, type: 'cover', title: 'EC LAB', subtitle: 'WORD NOTE' },
            { 
                id: 1, type: 'word', svg: svgAttack,
                vocab1: { furigana: 'こうげき', kanji: '攻撃', romaji: 'kougeki', en: 'attack', id: 'serangan' },
                vocab2: { furigana: 'たたかう', kanji: '戦う', romaji: 'tatakau', en: 'to fight', id: 'bertarung' },
                vocabVisible: false // track 2D state internally
            },
            { 
                id: 2, type: 'word', svg: svgMagic,
                vocab1: { furigana: 'まほう', kanji: '魔法', romaji: 'mahou', en: 'magic', id: 'sihir' },
                vocab2: { furigana: 'となえる', kanji: '唱える', romaji: 'tonaeru', en: 'to cast', id: 'merapalkan' },
                vocabVisible: false
            },
            { 
                id: 3, type: 'word', svg: svgDefense,
                vocab1: { furigana: 'ぼうぎょ', kanji: '防御', romaji: 'bougyo', en: 'defense', id: 'pertahanan' },
                vocab2: { furigana: 'まもる', kanji: '守る', romaji: 'mamoru', en: 'to protect', id: 'melindungi' },
                vocabVisible: false
            },
            { id: 4, type: 'cover', title: 'EC LAB', subtitle: 'VISUAL NOTES' }
        ];

        const sceneEl = document.getElementById('scene');
        const arrowNext = document.getElementById('arrow-next');
        const arrowPrev = document.getElementById('arrow-prev');

        // Initial state
        let currentPageIndex = 0;
        let isAnimating = false;

        // Generate DOM for all pages
        bookData.forEach((data, index) => {
            const pageEl = document.createElement('div');
            pageEl.className = `page ${data.type === 'cover' ? 'is-cover' : 'is-content'}`;
            pageEl.id = `page-${index}`;
            // Z-index ensures correct visual stacking (top page has highest z-index)
            pageEl.style.zIndex = bookData.length - index;

            let innerHTML = '';
            const pageNumText = `${index + 1} / ${bookData.length}`;

            if (data.type === 'cover') {
                innerHTML = `
                    <div class="card-inner">
                        <div class="cover-content">
                            <h2>${data.title}</h2>
                            <p>${data.subtitle}</p>
                            <div class="cover-line"></div>
                        </div>
                        <span class="page-num">${pageNumText}</span>
                        ${index === 0 ? '<span class="tap-hint">tap bottom to open</span>' : ''}
                    </div>
                `;
            } else {
                innerHTML = `
                    <div class="card-inner">
                        <div class="tag-vertical">
                            <span>JRPG</span>
                            <div class="tag-line"></div>
                            <span>用語</span>
                        </div>
                        <div class="illus-wrapper">
                            ${data.svg}
                        </div>
                        <div class="vocab-wrapper">
                            <div class="vocab-col">
                                <div class="v-furigana">${data.vocab1.furigana}</div>
                                <div class="v-kanji">${data.vocab1.kanji}</div>
                                <div class="v-romaji">${data.vocab1.romaji}</div>
                                <div class="v-en">${data.vocab1.en}</div>
                                <div class="v-id">${data.vocab1.id}</div>
                            </div>
                            <div class="vocab-divider">
                                <svg class="sync-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 2v6h-6"></path>
                                    <path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path>
                                    <path d="M3 22v-6h6"></path>
                                    <path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path>
                                </svg>
                            </div>
                            <div class="vocab-col right">
                                <div class="v-furigana">${data.vocab2.furigana}</div>
                                <div class="v-kanji">${data.vocab2.kanji}</div>
                                <div class="v-romaji">${data.vocab2.romaji}</div>
                                <div class="v-en">${data.vocab2.en}</div>
                                <div class="v-id">${data.vocab2.id}</div>
                            </div>
                        </div>
                        <span class="page-num">${pageNumText}</span>
                    </div>
                `;
            }
            pageEl.innerHTML = innerHTML;
            sceneEl.appendChild(pageEl);
        });

        function showArrowHint(direction) {
            const arrow = direction === 'next' ? arrowNext : arrowPrev;
            arrow.classList.add('active');
            setTimeout(() => { arrow.classList.remove('active'); }, 800);
        }

        function handleAction(action, event) {
            if (isAnimating) return;

            const currentData = bookData[currentPageIndex];
            const currentPageEl = document.getElementById(`page-${currentPageIndex}`);

            if (action === 'next') {
                // If it's a word page and vocab is hidden -> reveal vocab (2D Shift)
                if (currentData.type === 'word' && !currentData.vocabVisible) {
                    currentPageEl.classList.add('show-vocab');
                    currentData.vocabVisible = true;
                } 
                // Otherwise, flip the page (3D Turn)
                else if (currentPageIndex < bookData.length - 1) {
                    isAnimating = true;
                    showArrowHint('next');
                    currentPageEl.classList.add('flipped');
                    currentPageIndex++;
                    setTimeout(() => { isAnimating = false; }, 800);
                }
            } 
            else if (action === 'prev') {
                // If it's a word page and vocab is visible -> hide vocab (2D Shift)
                if (currentData.type === 'word' && currentData.vocabVisible) {
                    currentPageEl.classList.remove('show-vocab');
                    currentData.vocabVisible = false;
                } 
                // Otherwise, un-flip the previous page (3D Turn backward)
                else if (currentPageIndex > 0) {
                    isAnimating = true;
                    showArrowHint('prev');
                    currentPageIndex--;
                    const prevPageEl = document.getElementById(`page-${currentPageIndex}`);
                    prevPageEl.classList.remove('flipped');
                    setTimeout(() => { isAnimating = false; }, 800);
                }
            }
        }
    </script>
</body>
</html>
