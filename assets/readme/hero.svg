<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="hero-title hero-desc">
  <title id="hero-title">EC LAB — 个人 UI 设计实验库</title>
  <desc id="hero-desc">标题区域展示 EC LAB 品牌和一句话价值，右侧是三张轻微旋转的预览卡片，代表单文件 HTML 实验。</desc>

  <defs>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <linearGradient id="card-a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0ecff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="card-b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff4e0"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="card-c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3e8ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="360" rx="28" fill="#f8f8f8"/>

  <!-- Left title block -->
  <g transform="translate(64, 80)">
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="500" fill="#8a8a8a" letter-spacing="0.12em">UI DESIGN LAB</text>
    <text x="0" y="68" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" font-size="64" font-weight="780" fill="#111111" letter-spacing="-0.03em">EC LAB</text>
    <text x="0" y="116" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="430" fill="#555555">单文件前端实验库 · 打开即用，复制即改</text>

    <!-- Live link pill -->
    <g transform="translate(0, 152)">
      <rect x="0" y="0" width="236" height="42" rx="21" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
      <circle cx="22" cy="21" r="6" fill="#10b981"/>
      <text x="40" y="26" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="560" fill="#111111">ec.edsionc.top</text>
      <text x="176" y="26" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#8a8a8a">LIVE</text>
    </g>
  </g>

  <!-- Right preview cards (motif) -->
  <g transform="translate(720, 60)" filter="url(#soft-shadow)">
    <!-- Back card -->
    <g transform="rotate(8 220 120)">
      <rect x="0" y="0" width="280" height="200" rx="22" fill="url(#card-c)" stroke="#e5e5e5" stroke-width="1"/>
      <rect x="20" y="20" width="100" height="100" rx="16" fill="#e9d5ff"/>
      <rect x="140" y="30" width="120" height="12" rx="6" fill="#d8b4fe"/>
      <rect x="140" y="54" width="90" height="12" rx="6" fill="#e9d5ff"/>
      <rect x="140" y="78" width="110" height="12" rx="6" fill="#f3e8ff"/>
      <circle cx="230" cy="160" r="18" fill="#a855f7" opacity="0.15"/>
    </g>

    <!-- Middle card -->
    <g transform="translate(-40, 20) rotate(-4 220 120)">
      <rect x="0" y="0" width="280" height="200" rx="22" fill="url(#card-b)" stroke="#e5e5e5" stroke-width="1"/>
      <rect x="20" y="20" width="240" height="70" rx="14" fill="#ffedd5"/>
      <rect x="40" y="110" width="60" height="60" rx="12" fill="#fed7aa"/>
      <rect x="120" y="110" width="60" height="60" rx="12" fill="#fdba74"/>
      <rect x="200" y="110" width="60" height="60" rx="12" fill="#fb923c"/>
    </g>

    <!-- Front card -->
    <g transform="translate(20, 50)">
      <rect x="0" y="0" width="280" height="200" rx="22" fill="url(#card-a)" stroke="#e5e5e5" stroke-width="1"/>
      <rect x="0" y="0" width="280" height="40" rx="22" fill="#ffffff"/>
      <rect x="0" y="20" width="280" height="180" rx="22" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
      <circle cx="24" cy="20" r="5" fill="#ef4444"/>
      <circle cx="42" cy="20" r="5" fill="#f59e0b"/>
      <circle cx="60" cy="20" r="5" fill="#10b981"/>
      <rect x="24" y="58" width="140" height="14" rx="7" fill="#bfdbfe"/>
      <rect x="24" y="86" width="100" height="14" rx="7" fill="#dbeafe"/>
      <rect x="24" y="114" width="180" height="14" rx="7" fill="#eff6ff"/>
      <rect x="24" y="150" width="232" height="34" rx="12" fill="#3b82f6" opacity="0.1"/>
    </g>
  </g>
</svg>
