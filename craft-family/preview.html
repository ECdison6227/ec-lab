<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Craft Family — Design System</title>
  <style>
    :root {
      --craft-black: #171717;
      --craft-gray: #f5f5f7;
      --craft-yellow: #facc15;
      --craft-border: #e5e5e5;
      --bg: #0f0f0f;
      --text: #f5f5f7;
      --muted: rgba(245, 245, 247, 0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Ambient lights */
    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .ambient-light {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      transition: opacity 1.5s ease, transform 1.5s ease;
    }
    .light-tl {
      top: -20%; left: -10%;
      width: 60%; height: 60%;
      background: rgba(255,255,255,0.06);
    }
    .light-tr {
      top: -20%; right: -10%;
      width: 60%; height: 60%;
      background: rgba(250,204,21,0.12);
      opacity: 0;
    }
    .light-tr.active { opacity: 1; }
    .light-bm {
      bottom: -30%; left: 50%;
      transform: translateX(-50%);
      width: 70%; height: 50%;
      background: rgba(59,130,246,0.06);
      animation: breathe 4s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
      50% { opacity: 0.8; transform: translateX(-50%) scale(1.1); }
    }

    /* Glass panel base */
    .glass {
      background: rgba(23,23,23,0.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* Blur-in entrance */
    .blur-in {
      animation: blurIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes blurIn {
      from { filter: blur(12px); opacity: 0; transform: scale(0.95); }
      to { filter: blur(0); opacity: 1; transform: scale(1); }
    }

    /* Float animation */
    .float {
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Scale-in */
    .scale-in {
      animation: scaleIn 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes scaleIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* App layout */
    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 24px;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 8px 0 16px;
      flex-shrink: 0;
    }

    .series-toggle {
      display: flex;
      background: rgba(255,255,255,0.05);
      border-radius: 999px;
      padding: 4px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .series-btn {
      padding: 8px 20px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.23,1,0.32,1);
    }

    .series-btn.active {
      background: #fff;
      color: #000;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    .series-btn.life.active {
      background: var(--craft-yellow);
      color: #000;
      box-shadow: 0 2px 16px rgba(250,204,21,0.35);
    }

    /* Main stage */
    .stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      min-height: 0;
    }

    .product-card-wrap {
      position: relative;
      width: 240px;
      height: 240px;
      margin-bottom: 32px;
      cursor: pointer;
    }

    @media (min-width: 760px) {
      .product-card-wrap {
        width: 300px;
        height: 300px;
        margin-bottom: 48px;
      }
    }

    /* Spotlight behind card */
    .spotlight {
      position: absolute;
      top: -40%; left: 50%;
      transform: translateX(-50%);
      width: 400px; height: 400px;
      border-radius: 50%;
      pointer-events: none;
      transition: opacity 1s ease;
      background: radial-gradient(ellipse at top, rgba(255,255,255,0.12) 0%, transparent 70%);
      opacity: 0;
    }
    .spotlight.on { opacity: 1; animation: spotBreathe 4s ease-in-out infinite alternate; }
    .spotlight.life { background: radial-gradient(ellipse at top, rgba(250,204,21,0.18) 0%, transparent 70%); }

    @keyframes spotBreathe {
      from { opacity: 0.5; transform: translateX(-50%) scale(1); }
      to { opacity: 0.8; transform: translateX(-50%) scale(1.1); }
    }

    /* Card */
    .card {
      position: relative;
      width: 100%; height: 100%;
      border-radius: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--craft-black);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.05);
      overflow: hidden;
      transition: box-shadow 0.5s ease;
    }

    .card.efficiency { box-shadow: 0 0 60px -10px rgba(255,255,255,0.12); }
    .card.life { box-shadow: 0 0 60px -10px rgba(250,204,21,0.25); }

    /* Shine sweep */
    .shine {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
      background-size: 200% 100%;
      animation: shineSweep 4s linear infinite;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .product-card-wrap:hover .shine { opacity: 1; }

    @keyframes shineSweep {
      from { background-position: 200% center; }
      to { background-position: -200% center; }
    }

    .card-logo {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 96px;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      transition: opacity 0.35s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      transform-style: preserve-3d;
      will-change: transform, opacity;
    }
    .card-logo.switching {
      opacity: 0;
      transform: rotateY(90deg) scale(0.8);
    }
    @media (min-width: 760px) { .card-logo { font-size: 120px; } }
    .product-card-wrap:hover .card-logo:not(.switching) { transform: scale(1.08); }

    .card-hint {
      position: absolute;
      bottom: 24px;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0.5;
      transition: opacity 0.3s ease;
    }
    .product-card-wrap:hover .card-hint { opacity: 1; }

    /* Text info */
    .info {
      text-align: center;
      max-width: 400px;
      padding: 0 16px;
    }

    .info-name {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 10px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }
    @media (min-width: 760px) { .info-name { font-size: 56px; } }

    .info-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    /* Detail modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      pointer-events: none;
      padding: 16px;
    }
    @media (min-width: 760px) {
      .modal { align-items: center; }
    }

    .modal-card {
      pointer-events: auto;
      width: 100%;
      max-width: 480px;
      background: rgba(28,28,30,0.9);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 32px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      transform: translateY(40px);
      opacity: 0;
      transition: transform 0.5s cubic-bezier(0.16,1,0.3,1), opacity 0.4s ease;
    }
    .modal.open .modal-card {
      transform: translateY(0);
      opacity: 1;
    }

    .modal-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .modal-icon {
      width: 56px; height: 56px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 24px;
      font-weight: 800;
      flex-shrink: 0;
    }

    .modal-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .modal-badge {
      display: inline-block;
      margin-top: 6px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .modal-body {
      font-size: 15px;
      line-height: 1.6;
      color: rgba(245,245,247,0.7);
      margin-bottom: 24px;
    }

    .modal-close {
      width: 100%;
      padding: 14px;
      border-radius: 16px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease;
    }
    .modal-close:active { transform: scale(0.97); }

    /* Dock */
    .dock {
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      padding: 16px 0 8px;
    }

    .dock-inner {
      display: flex;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 24px;
      background: rgba(23,23,23,0.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.08);
      border-bottom: 1px solid rgba(0,0,0,0.2);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .dock-item {
      width: 48px; height: 48px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.35);
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.23,1,0.32,1);
      position: relative;
    }

    .dock-item:hover {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.8);
      transform: scale(1.08);
    }

    .dock-item.active.efficiency {
      background: #fff;
      color: #000;
      box-shadow: 0 0 20px rgba(255,255,255,0.25);
      transform: scale(1.1);
    }

    .dock-item.active.life {
      background: var(--craft-yellow);
      color: #000;
      box-shadow: 0 0 20px rgba(250,204,21,0.4);
      transform: scale(1.1);
    }

    .dock-tooltip {
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      padding: 5px 12px;
      border-radius: 8px;
      background: rgba(26,26,26,0.95);
      border: 1px solid rgba(255,255,255,0.08);
      font-family: Inter, sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    .dock-item:hover .dock-tooltip {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Transition helpers */
    .fade-enter { opacity: 0; transform: translateY(12px); }
    .fade-enter-active { opacity: 1; transform: translateY(0); transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.16,1,0.3,1); }
    .fade-exit { opacity: 1; transform: translateY(0); }
    .fade-exit-active { opacity: 0; transform: translateY(-12px); transition: opacity 0.35s ease, transform 0.35s ease; }
  </style>
</head>
<body>
  <div class="ambient">
    <div class="ambient-light light-tl" id="lightTL"></div>
    <div class="ambient-light light-tr" id="lightTR"></div>
    <div class="ambient-light light-bm"></div>
  </div>

  <div class="app blur-in">
    <header class="header">
      <div class="series-toggle">
        <button class="series-btn active" id="btnEff" onclick="setSeries('efficiency')">Efficiency</button>
        <button class="series-btn life" id="btnLife" onclick="setSeries('life')">Life</button>
      </div>
    </header>

    <main class="stage" id="stage">
      <div class="product-card-wrap" id="cardWrap" onclick="openModal()">
        <div class="spotlight on" id="spotlight"></div>
        <div class="card efficiency float" id="mainCard">
          <div class="shine"></div>
          <div class="card-logo" id="cardLogo">F</div>
          <div class="card-hint">Open</div>
        </div>
      </div>

      <div class="info" id="infoBox">
        <h1 class="info-name" id="infoName">FlashCraft</h1>
        <p class="info-desc" id="infoDesc">沉浸式记忆卡片</p>
      </div>
    </main>

    <footer class="dock">
      <div class="dock-inner" id="dock"></div>
    </footer>
  </div>

  <div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
  <div class="modal" id="modal">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-icon" id="modalIcon" style="background:#171717;color:#fff;">F</div>
        <div>
          <div class="modal-title" id="modalTitle">FlashCraft</div>
          <div class="modal-badge" id="modalBadge" style="background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);">efficiency</div>
        </div>
      </div>
      <div class="modal-body" id="modalBody">基于艾宾浩斯遗忘曲线的智能记忆工具。支持 3D 卡片翻转，关联记忆网络，助你高效掌握任何知识点。</div>
      <button class="modal-close" id="modalClose" style="background:#fff;color:#000;" onclick="closeModal()">关闭</button>
    </div>
  </div>

  <script>
    const SERIES = { EFFICIENCY: 'efficiency', LIFE: 'life' };

    const PRODUCTS = [
      { id: 'flashcraft', name: 'FlashCraft', series: SERIES.EFFICIENCY, desc: '沉浸式记忆卡片', longDesc: '基于艾宾浩斯遗忘曲线的智能记忆工具。支持 3D 卡片翻转，关联记忆网络，助你高效掌握任何知识点。', isNew: true },
      { id: 'notecraft', name: 'NoteCraft', series: SERIES.LIFE, desc: '智能错题排版与笔记整理', longDesc: 'NoteCraft 是学生和终身学习者的终极工具。智能识别错题，一键去手写，自动生成高清试卷。支持 Markdown 导出与 AI 辅助整理。' },
      { id: 'markcraft', name: 'MarkCraft', series: SERIES.LIFE, desc: '极简 Markdown 写作工坊', longDesc: '为专注而生。MarkCraft 提供零干扰的写作环境，支持 LaTeX 公式、实时预览和深度自定义导出。让思考自由流淌。' },
      { id: 'coursecraft', name: 'CourseCraft', series: SERIES.EFFICIENCY, desc: '智能教学管理', longDesc: '课程创建、课表编排、调课/请假与资料发布一站管理，双身份切换即用。' },
      { id: 'weathercraft', name: 'WeatherCraft', series: SERIES.LIFE, desc: '极简美学气象站', longDesc: '感知温度，而非仅仅阅读数据。WeatherCraft 用动态光影展示天气变化，提供穿衣建议与出行指数，做你最贴心的生活助手。' }
    ];

    let activeSeries = SERIES.EFFICIENCY;
    let activeIndex = 0;
    let filtered = [];

    const els = {
      lightTL: document.getElementById('lightTL'),
      lightTR: document.getElementById('lightTR'),
      btnEff: document.getElementById('btnEff'),
      btnLife: document.getElementById('btnLife'),
      cardWrap: document.getElementById('cardWrap'),
      spotlight: document.getElementById('spotlight'),
      mainCard: document.getElementById('mainCard'),
      cardLogo: document.getElementById('cardLogo'),
      infoName: document.getElementById('infoName'),
      infoDesc: document.getElementById('infoDesc'),
      infoBox: document.getElementById('infoBox'),
      dock: document.getElementById('dock'),
      modal: document.getElementById('modal'),
      modalOverlay: document.getElementById('modalOverlay'),
      modalIcon: document.getElementById('modalIcon'),
      modalTitle: document.getElementById('modalTitle'),
      modalBadge: document.getElementById('modalBadge'),
      modalBody: document.getElementById('modalBody'),
      modalClose: document.getElementById('modalClose')
    };

    function updateFiltered() {
      filtered = PRODUCTS.filter(p => p.series === activeSeries);
      activeIndex = Math.min(activeIndex, filtered.length - 1);
      if (activeIndex < 0) activeIndex = 0;
    }

    function renderCard(animate = true) {
      const p = filtered[activeIndex];
      if (!p) return;

      const isLife = p.series === SERIES.LIFE;

      // Ambient lights
      els.lightTL.style.opacity = isLife ? '0.2' : '0.8';
      els.lightTR.classList.toggle('active', isLife);

      // Spotlight
      els.spotlight.classList.toggle('life', isLife);

      // Card shadow class
      els.mainCard.className = 'card float ' + (isLife ? 'life' : 'efficiency');

      // Logo with 3D flip transition
      if (animate) {
        els.cardLogo.classList.add('switching');
        setTimeout(() => {
          els.cardLogo.textContent = p.name.charAt(0);
          els.cardLogo.classList.remove('switching');
        }, 350);
      } else {
        els.cardLogo.textContent = p.name.charAt(0);
      }

      // Info with fade transition (staggered after logo)
      if (animate) {
        els.infoBox.style.opacity = '0';
        els.infoBox.style.transform = 'translateY(16px)';
        els.infoBox.style.transition = 'none';
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            els.infoName.textContent = p.name;
            els.infoDesc.textContent = p.desc;
            els.infoBox.style.transition = 'opacity 0.5s ease 0.15s, transform 0.5s cubic-bezier(0.16,1,0.3,1) 0.15s';
            els.infoBox.style.opacity = '1';
            els.infoBox.style.transform = 'translateY(0)';
          });
        });
      } else {
        els.infoName.textContent = p.name;
        els.infoDesc.textContent = p.desc;
      }

      renderDock();
    }

    function renderDock() {
      els.dock.innerHTML = filtered.map((p, i) => {
        const isActive = i === activeIndex;
        return `<button class="dock-item ${isActive ? 'active ' + p.series : ''}" onclick="setProduct(${i})" aria-label="${p.name}">
          <span>${p.name.charAt(0)}</span>
          <span class="dock-tooltip">${p.name}</span>
        </button>`;
      }).join('');
    }

    function setSeries(series) {
      if (activeSeries === series) return;
      activeSeries = series;
      activeIndex = 0;

      els.btnEff.classList.toggle('active', series === SERIES.EFFICIENCY);
      els.btnLife.classList.toggle('active', series === SERIES.LIFE);

      updateFiltered();
      renderCard(true);
    }

    function setProduct(index) {
      if (index === activeIndex) return;
      activeIndex = index;
      renderCard(true);
    }

    function openModal() {
      const p = filtered[activeIndex];
      if (!p) return;
      const isLife = p.series === SERIES.LIFE;

      els.modalIcon.textContent = p.name.charAt(0);
      els.modalIcon.style.background = isLife ? 'var(--craft-yellow)' : '#171717';
      els.modalIcon.style.color = isLife ? '#000' : '#fff';

      els.modalTitle.textContent = p.name;
      els.modalBadge.textContent = p.series;
      els.modalBadge.style.background = isLife ? 'rgba(250,204,21,0.15)' : 'rgba(255,255,255,0.1)';
      els.modalBadge.style.color = isLife ? 'var(--craft-yellow)' : 'rgba(255,255,255,0.7)';
      els.modalBadge.style.borderColor = isLife ? 'rgba(250,204,21,0.3)' : 'rgba(255,255,255,0.15)';

      els.modalBody.textContent = p.longDesc;
      els.modalClose.style.background = isLife ? 'var(--craft-yellow)' : '#fff';
      els.modalClose.style.color = '#000';

      els.modalOverlay.classList.add('open');
      els.modal.classList.add('open');
    }

    function closeModal() {
      els.modalOverlay.classList.remove('open');
      els.modal.classList.remove('open');
    }

    // Swipe support
    let touchStartX = 0;
    els.cardWrap.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    els.cardWrap.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 40) {
        if (dx < 0 && activeIndex < filtered.length - 1) setProduct(activeIndex + 1);
        if (dx > 0 && activeIndex > 0) setProduct(activeIndex - 1);
      }
    }, { passive: true });

    // Keyboard support
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft' && activeIndex > 0) setProduct(activeIndex - 1);
      if (e.key === 'ArrowRight' && activeIndex < filtered.length - 1) setProduct(activeIndex + 1);
      if (e.key === 'Escape') closeModal();
    });

    // Init
    updateFiltered();
    renderCard(false);
  </script>
</body>
</html>
