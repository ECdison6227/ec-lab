<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EC LAB Preview Gallery</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --page: #ffffff;
      --text: #111111;
      --muted: #8a8a8a;
      --line: #eeeeee;
      --soft: #f8f8f8;
      --shadow: 0 22px 80px rgba(0, 0, 0, 0.08);
      --radius: 28px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--page);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .shell {
      width: min(1180px, calc(100vw - 40px));
      margin: 0 auto;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 18px;
      padding: 34px 0 24px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: grid;
      gap: 4px;
    }

    .brand-title {
      margin: 0;
      font-size: clamp(22px, 3vw, 34px);
      font-weight: 760;
      letter-spacing: 0;
      line-height: 1;
    }

    .brand-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .github-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #ffffff;
      color: var(--text);
      font-size: 12.5px;
      font-weight: 500;
      text-decoration: none;
      transition: background 180ms ease, transform 180ms ease, border-color 180ms ease;
    }
    .github-link:hover {
      background: var(--surface);
      border-color: rgba(0, 0, 0, 0.12);
      transform: translateY(-1px);
    }
    .github-link svg { width: 14px; height: 14px; }

    .count {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .viewport {
      min-width: 0;
      display: grid;
      align-items: center;
      position: relative;
    }

    .viewport-hint {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 40px;
      height: 80px;
      border-radius: 12px;
      background: rgba(248, 248, 248, 0.9);
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      cursor: pointer;
      transition: background 200ms ease, transform 200ms ease;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }

    .viewport-hint:hover {
      background: #ffffff;
      transform: translateY(-50%) scale(1.02);
    }

    .viewport-hint-left { left: 4px; }
    .viewport-hint-right { right: 4px; }

    .viewport-hint svg {
      width: 20px;
      height: 20px;
      stroke: var(--muted);
      stroke-width: 2;
      fill: none;
    }

    .carousel {
      display: flex;
      gap: 24px;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      overscroll-behavior-x: contain;
      padding: 8px 0 18px;
    }

    .carousel::-webkit-scrollbar {
      display: none;
    }

    .slide {
      flex: 0 0 100%;
      scroll-snap-align: center;
      display: grid;
      grid-template-rows: auto auto auto;
      gap: 16px;
      min-width: 0;
    }

    .slide-meta {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      padding: 0 2px;
    }

    .slide-title {
      margin: 0;
      font-size: clamp(20px, 2.4vw, 30px);
      font-weight: 720;
      letter-spacing: 0;
      line-height: 1.1;
    }

    .slide-note {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .slide-actions {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .detail-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 15px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #ffffff;
      font-size: 13px;
      font-weight: 650;
      white-space: nowrap;
      transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
    }

    .detail-button:hover {
      background: #f7f7f7;
      border-color: #dedede;
      transform: translateY(-1px);
    }

    .slide-index {
      color: #d6d6d6;
      font-size: clamp(42px, 7vw, 78px);
      font-weight: 760;
      line-height: 0.85;
      user-select: none;
    }

    .preview-panel {
      position: relative;
      display: block;
      height: clamp(560px, 74vh, 860px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--soft);
      box-shadow: var(--shadow);
      overflow: hidden;
      outline: none;
    }

    .preview-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #ffffff;
      display: block;
    }

    .config-panel {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(280px, 0.95fr);
      gap: 14px;
    }

    .config-card {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: #ffffff;
      padding: 18px;
      min-width: 0;
    }

    .config-card h3 {
      margin: 0 0 10px;
      font-size: 13px;
      font-weight: 760;
      letter-spacing: 0;
    }

    .prompt-text {
      margin: 0;
      color: #555555;
      font-size: 13px;
      line-height: 1.65;
      max-height: 190px;
      overflow: auto;
      padding-right: 6px;
    }

    .token-list {
      display: grid;
      gap: 8px;
      max-height: 190px;
      overflow: auto;
      padding-right: 4px;
    }

    .token-row {
      display: grid;
      grid-template-columns: minmax(112px, 0.58fr) minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      border-top: 1px solid #f3f3f3;
      padding-top: 8px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 12px;
      line-height: 1.35;
    }

    .token-row:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .token-key {
      color: #999999;
      overflow-wrap: anywhere;
    }

    .token-value {
      color: #222222;
      overflow-wrap: anywhere;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .arrow-group {
      display: flex;
      gap: 10px;
    }

    .arrow,
    .dot {
      border: 1px solid var(--line);
      background: #ffffff;
    }

    .arrow {
      width: 46px;
      height: 46px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
    }

    .arrow:hover {
      transform: translateY(-1px);
      background: #f7f7f7;
      border-color: #dedede;
    }

    .arrow svg {
      width: 19px;
      height: 19px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .dots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex: 1;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      padding: 0;
      transition: width 180ms ease, background 180ms ease, border-color 180ms ease;
    }

    .dot[aria-current="true"] {
      width: 32px;
      background: #111111;
      border-color: #111111;
    }

    .helper {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
      white-space: nowrap;
    }

    @media (max-width: 760px) {
      .viewport-hint {
        display: none;
      }

      .shell {
        width: min(100vw - 24px, 640px);
        padding: 20px 0 18px;
        gap: 12px;
      }

      .topbar {
        align-items: start;
      }

      .count,
      .helper {
        display: none;
      }

      .slide-meta {
        align-items: start;
      }

      .slide-index {
        font-size: 44px;
      }

      .slide-meta {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
      }

      .slide-actions {
        flex-direction: column-reverse;
        align-items: end;
        gap: 10px;
      }

      .preview-panel {
        height: min(72vh, 620px);
        border-radius: 22px;
      }

      .config-panel {
        grid-template-columns: 1fr;
      }

      .config-card {
        padding: 15px;
        border-radius: 18px;
      }

      .prompt-text,
      .token-list {
        max-height: 180px;
      }

      .controls {
        justify-content: center;
      }

      .dots {
        flex: 0;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar" aria-label="页面标题">
      <div class="brand">
        <h1 class="brand-title">EC LAB</h1>
        <p class="brand-subtitle">纯白预览库 · Personal UI Design Portfolio</p>
      </div>
      <div class="topbar-actions">
        <a class="github-link" href="https://github.com/ECdison6227/ec-lab" target="_blank" rel="noopener" aria-label="在 GitHub 上查看源码">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.57.11.78-.25.78-.55v-2.13c-3.2.7-3.87-1.36-3.87-1.36-.52-1.33-1.28-1.69-1.28-1.69-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.77 2.71 1.26 3.37.96.1-.75.4-1.26.73-1.55-2.55-.29-5.24-1.28-5.24-5.7 0-1.26.45-2.29 1.18-3.1-.12-.29-.51-1.47.11-3.06 0 0 .97-.31 3.18 1.18a11 11 0 0 1 5.79 0c2.21-1.49 3.18-1.18 3.18-1.18.62 1.59.23 2.77.11 3.06.74.81 1.18 1.84 1.18 3.1 0 4.43-2.69 5.41-5.25 5.69.41.36.78 1.06.78 2.13v3.16c0 .3.21.66.79.55C20.21 21.39 23.5 17.08 23.5 12 23.5 5.65 18.35.5 12 .5z"/></svg>
          <span>Star on GitHub</span>
        </a>
        <div class="count" id="countLabel">1 / 5</div>
      </div>
    </header>

    <section class="viewport" aria-label="项目预览轮播">
      <button class="viewport-hint viewport-hint-left" type="button" id="viewportPrev" aria-label="上一个项目">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="carousel" id="carousel"></div>
      <button class="viewport-hint viewport-hint-right" type="button" id="viewportNext" aria-label="下一个项目">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg>
      </button>
    </section>

    <nav class="controls" aria-label="轮播控制">
      <div class="arrow-group">
        <button class="arrow" type="button" id="prevBtn" aria-label="上一页">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <button class="arrow" type="button" id="nextBtn" aria-label="下一页">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg>
        </button>
      </div>
      <div class="dots" id="dots" aria-label="选择项目"></div>
      <div class="helper">预览框内可滚动查看完整页面</div>
    </nav>
  </main>

  <script>
    const fallbackProjects = [
      {
        id: "ec-global-payments-hero",
        title: "EC Global Payments Hero",
        note: "Global payments landing hero",
        src: "ec-global-payments-hero/preview.html",
        meta: "ec-global-payments-hero/meta.json"
      },
      {
        id: "ostraka-ui-cards",
        title: "Ostraka UI Cards",
        note: "Three-card visual identity layout",
        src: "ostraka-ui-cards/preview.html",
        meta: "ostraka-ui-cards/meta.json"
      },
      {
        id: "ec-lab-charging-progress",
        title: "EC LAB Charging Progress",
        note: "Animated charging progress card",
        src: "ec-lab-charging-progress/preview.html",
        meta: "ec-lab-charging-progress/meta.json"
      },
      {
        id: "ec-blue-glass-triptych",
        title: "EC Blue Glass Triptych",
        note: "Blue glass poster gallery",
        src: "ec-blue-glass-triptych/preview.html",
        meta: "ec-blue-glass-triptych/meta.json"
      },
      {
        id: "ec-flip-word-notes",
        title: "EC Flip Word Notes",
        note: "Visual word-note flashcard",
        src: "ec-flip-word-notes/preview.html",
        meta: "ec-flip-word-notes/meta.json"
      },
      {
        id: "pixel-icon-library",
        title: "Pixel Icon Library",
        note: "Vertical pixel icon archive",
        src: "pixel-icon-library/preview.html",
        meta: "pixel-icon-library/meta.json"
      },
      {
        id: "visual-notes-magnifier",
        title: "Visual Notes Magnifier",
        note: "Interactive circular glass magnifier",
        src: "visual-notes-magnifier/preview.html",
        meta: "visual-notes-magnifier/meta.json"
      },
      {
        id: "craft-family",
        title: "Craft Family Design System",
        note: "Craft Family 统一设计系统主页",
        src: "craft-family/preview.html",
        meta: "craft-family/meta.json"
      }
    ];

    let projects = fallbackProjects.map((project) => ({ ...project }));

    const carousel = document.querySelector("#carousel");
    const dots = document.querySelector("#dots");
    const countLabel = document.querySelector("#countLabel");
    const prevBtn = document.querySelector("#prevBtn");
    const nextBtn = document.querySelector("#nextBtn");
    let activeIndex = 0;
    let lockedIndex = null;
    let scrollTargetTimer;

    function pad(num) {
      return String(num).padStart(2, "0");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderCssTokens(css) {
      if (!css || !Object.keys(css).length) {
        return `<div class="token-row"><span class="token-key">status</span><span class="token-value">Loading metadata...</span></div>`;
      }

      return Object.entries(css).map(([key, value]) => `
        <div class="token-row">
          <span class="token-key">${escapeHtml(key)}</span>
          <span class="token-value">${escapeHtml(value)}</span>
        </div>
      `).join("");
    }

    function render() {
      carousel.innerHTML = projects.map((project, index) => `
        <article class="slide" aria-label="${project.title}">
          <div class="slide-meta">
            <div>
              <h2 class="slide-title">${project.title}</h2>
              <p class="slide-note">${project.note}</p>
            </div>
            <div class="slide-actions">
              <a class="detail-button" href="detail.html?id=${encodeURIComponent(project.id)}" aria-label="打开 ${project.title} 详情">查看详细</a>
              <div class="slide-index">${pad(index + 1)}</div>
            </div>
          </div>
          <div class="preview-panel" aria-label="${project.title} 可滚动预览">
            <iframe class="preview-frame" title="${project.title} preview" src="${project.src}" loading="${index === 0 ? "eager" : "lazy"}" sandbox="allow-scripts allow-same-origin"></iframe>
          </div>
          <section class="config-panel" aria-label="${project.title} 配置">
            <div class="config-card">
              <h3>Prompt</h3>
              <p class="prompt-text">${escapeHtml(project.prompt || "Loading metadata...")}</p>
            </div>
            <div class="config-card">
              <h3>CSS Tokens</h3>
              <div class="token-list">${renderCssTokens(project.css)}</div>
            </div>
          </section>
        </article>
      `).join("");

      dots.innerHTML = projects.map((project, index) => `
        <button class="dot" type="button" aria-label="切换到 ${project.title}" data-index="${index}" aria-current="${index === 0}"></button>
      `).join("");
    }

    function scrollToIndex(index) {
      activeIndex = (index + projects.length) % projects.length;
      lockedIndex = activeIndex;
      window.clearTimeout(scrollTargetTimer);
      const slide = carousel.children[activeIndex];
      if (slide) {
        const left = slide.offsetLeft - carousel.offsetLeft;
        carousel.scrollTo({
          left,
          behavior: "smooth"
        });
        scrollTargetTimer = window.setTimeout(() => {
          carousel.scrollTo({ left, behavior: "auto" });
          lockedIndex = null;
          activeIndex = nearestSlideIndex();
          updateState();
        }, 620);
      }
      updateState();
    }

    function updateState() {
      countLabel.textContent = `${activeIndex + 1} / ${projects.length}`;
      document.querySelectorAll(".dot").forEach((dot, index) => {
        dot.setAttribute("aria-current", String(index === activeIndex));
      });
    }

    function nearestSlideIndex() {
      const slides = Array.from(carousel.children);
      const center = carousel.scrollLeft + carousel.clientWidth / 2;
      return slides.reduce((closest, slide, index) => {
        const slideCenter = slide.offsetLeft - carousel.offsetLeft + slide.clientWidth / 2;
        const distance = Math.abs(center - slideCenter);
        return distance < closest.distance ? { index, distance } : closest;
      }, { index: 0, distance: Infinity }).index;
    }

    function normalizeProject(project) {
      const id = project.id || "";
      const src = project.src || `${id}/preview.html`;
      return {
        id,
        title: project.title || id,
        note: project.note || "EC inspiration asset",
        src,
        meta: project.meta || `${id}/meta.json`,
        prompt: project.prompt || project.html_prompt || "",
        css: project.css || {}
      };
    }

    async function loadProjectList() {
      try {
        const response = await fetch("projects.json", { cache: "no-store" });
        if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
        const discovered = await response.json();
        if (!Array.isArray(discovered) || discovered.length === 0) {
          throw new Error("empty project list");
        }
        projects = discovered.map(normalizeProject);
      } catch (error) {
        projects = fallbackProjects.map(normalizeProject);
      }
    }

    async function loadMetadata() {
      await Promise.all(projects.map(async (project) => {
        if (project.prompt && project.css && Object.keys(project.css).length) return;
        try {
          const response = await fetch(project.meta);
          if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
          const metadata = await response.json();
          project.title = metadata.title || project.title;
          project.prompt = metadata.html_prompt || "";
          project.css = metadata.css || {};
        } catch (error) {
          project.prompt = `Metadata unavailable: ${error.message}`;
          project.css = {};
        }
      }));

      render();
      updateState();
    }

    async function boot() {
      render();
      updateState();
      await loadProjectList();
      render();
      updateState();
      await loadMetadata();
    }

    boot();

    prevBtn.addEventListener("click", () => scrollToIndex(activeIndex - 1));
    nextBtn.addEventListener("click", () => scrollToIndex(activeIndex + 1));

    const viewportPrevBtn = document.querySelector("#viewportPrev");
    const viewportNextBtn = document.querySelector("#viewportNext");
    if (viewportPrevBtn) viewportPrevBtn.addEventListener("click", () => scrollToIndex(activeIndex - 1));
    if (viewportNextBtn) viewportNextBtn.addEventListener("click", () => scrollToIndex(activeIndex + 1));

    dots.addEventListener("click", (event) => {
      const button = event.target.closest("[data-index]");
      if (button) {
        scrollToIndex(Number(button.dataset.index));
      }
    });

    carousel.addEventListener("scroll", () => {
      window.clearTimeout(carousel.scrollTimer);
      carousel.scrollTimer = window.setTimeout(() => {
        if (lockedIndex !== null) {
          activeIndex = lockedIndex;
          updateState();
          return;
        }
        activeIndex = nearestSlideIndex();
        updateState();
      }, 80);
    }, { passive: true });

    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") scrollToIndex(activeIndex - 1);
      if (event.key === "ArrowRight") scrollToIndex(activeIndex + 1);
    });
  </script>
</body>
</html>
